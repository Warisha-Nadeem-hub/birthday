<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 22nd Birthday Nawal!</title>
    <!-- Google Fonts for a cute typography style -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 50%, #e8dbfc 100%);
            font-family: 'Quicksand', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #4a4a4a;
        }

        /* Canvas container for Three.js background */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none; /* Let clicks pass through to buttons */
        }

        /* Main UI Container */
        .card-container {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px 30px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(255, 182, 193, 0.4);
            border: 4px solid #fff;
            transform: scale(0.9);
            opacity: 0;
            animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 2.5rem;
            color: #ff5c8a;
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px rgba(255, 92, 138, 0.15);
            margin-bottom: 5px;
            line-height: 1.2;
        }

        .age-badge {
            display: inline-block;
            background: #b583ff;
            color: white;
            font-family: 'Fredoka One', cursive;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 1.2rem;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(181, 131, 255, 0.4);
            transform: rotate(-3deg);
        }

        p.message {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            font-weight: 700;
            color: #6a6a6a;
        }

        /* Cute CSS 3D Interactive Box */
        .gift-scene {
            width: 120px;
            height: 120px;
            perspective: 600px;
            margin: 0 auto 35px auto;
            cursor: pointer;
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(-20deg) rotateY(45deg);
            transition: transform 0.5s ease;
        }

        .gift-scene:hover .cube {
            transform: rotateX(-20deg) rotateY(225deg) scale(1.1);
        }

        .cube__face {
            position: absolute;
            width: 120px;
            height: 120px;
            border: 3px solid #fff;
            opacity: 0.95;
        }

        /* Gift box colors & ribbons using CSS backgrounds */
        .cube__face--front  { background: #ff758f; transform: rotateY(  0deg) translateZ(60px); }
        .cube__face--right  { background: #ff758f; transform: rotateY( 90deg) translateZ(60px); }
        .cube__face--back   { background: #ff758f; transform: rotateY(180deg) translateZ(60px); }
        .cube__face--left   { background: #ff758f; transform: rotateY(-90deg) translateZ(60px); }
        .cube__face--top    { background: #ff8fa3; transform: rotateX( 90deg) translateZ(60px); }
        .cube__face--bottom { background: #ff4d6d; transform: rotateX(-90deg) translateZ(60px); }

        /* Cross ribbons */
        .cube__face::before {
            content: '';
            position: absolute;
            background: #ffde43;
            top: 0; left: 50px; width: 20px; height: 100%;
        }
        .cube__face::after {
            content: '';
            position: absolute;
            background: #ffde43;
            top: 50px; left: 0; width: 100%; height: 20px;
        }

        /* Wish Button */
        .btn {
            font-family: 'Fredoka One', cursive;
            background: #ff5c8a;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 92, 138, 0.3);
            transition: all 0.3s ease;
            outline: none;
        }

        .btn:hover {
            background: #ff477e;
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(255, 92, 138, 0.5);
        }

        .btn:active {
            transform: translateY(1px);
        }
    </style>

    <!-- Loading Three.js for 3D Background Floating Balloons/Spheres -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Loading Canvas-Confetti for the celebratory burst effect -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="card-container">
        <h1>Happy Birthday,<br>Nawal Numan!</h1>
        <div class="age-badge">22 Years Bold ✨</div>
        
        <!-- 3D Interactive Present Box -->
        <div class="gift-scene" onclick="celebrate()">
            <div class="cube" id="giftCube">
                <div class="cube__face cube__face--front"></div>
                <div class="cube__face cube__face--right"></div>
                <div class="cube__face cube__face--back"></div>
                <div class="cube__face cube__face--left"></div>
                <div class="cube__face cube__face--top"></div>
                <div class="cube__face cube__face--bottom"></div>
            </div>
        </div>

        <p class="message">
            Wishing you a year filled with sweet surprises, beautiful adventures, and endless laughter. Hover or spin the gift box, and click below to celebrate! 🎂💖
        </p>

        <button class="btn" onclick="celebrate()">Click to Celebrate 🎉</button>
    </div>

    <script>
        // --- THREE.JS 3D BACKGROUND SETTING ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // Camera setup
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 30;

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // Add soft ambient lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        // Add directional light to create 3D shadows/depth
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(10, 20, 15);
        scene.add(dirLight);

        // Generate a bunch of cute 3D pastel floating bubbles/balloons
        const balloonCount = 30;
        const balloons = [];
        const colors = [0xffb6c1, 0xffc2d1, 0xb583ff, 0x98f5ff, 0xffdeb3, 0xfff0f5];

        for (let i = 0; i < balloonCount; i++) {
            // Cute balloon/egg-like smooth 3D shape
            const geometry = new THREE.SphereGeometry(Math.random() * 1.5 + 0.8, 32, 32);
            // Matte pastel finish material
            const material = new THREE.MeshToonMaterial({
                color: colors[Math.floor(Math.random() * colors.length)],
                roughness: 0.2
            });
            
            const mesh = new THREE.Mesh(geometry, material);
            
            // Randomly scatter them across the view space
            mesh.position.x = (Math.random() - 0.5) * 45;
            mesh.position.y = (Math.random() - 0.5) * 45;
            mesh.position.z = (Math.random() - 0.5) * 20;
            
            // Random speed parameters for organic floating animation
            mesh.userData = {
                speedY: Math.random() * 0.03 + 0.01,
                rotSpeed: Math.random() * 0.01,
                driftX: Math.sin(Math.random() * 10) * 0.01
            };
            
            scene.add(mesh);
            balloons.push(mesh);
        }

        // Animation Loop for Three.js
        function animate() {
            requestAnimationFrame(animate);
            
            balloons.forEach(b => {
                b.position.y += b.userData.speedY;
                b.position.x += b.userData.driftX;
                b.rotation.x += b.userData.rotSpeed;
                b.rotation.y += b.userData.rotSpeed;
                
                // If balloon floats past top screen, recycle to the bottom
                if (b.position.y > 25) {
                    b.position.y = -25;
                    b.position.x = (Math.random() - 0.5) * 45;
                }
            });

            renderer.render(scene, camera);
        }
        animate();

        // Handle browser window resizing dynamically
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- CELEBRATION & CONFETTI INTERACTION ---
        function celebrate() {
            // 3D box spin kick effect
            const cube = document.getElementById('giftCube');
            cube.style.transform = "rotateX(360deg) rotateY(720deg)";
            setTimeout(() => {
                cube.style.transform = "rotateX(-20deg) rotateY(45deg)";
            }, 800);

            // Pop confetti burst from both lower sides of the screen
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.8, x: 0.2 },
                colors: ['#ff5c8a', '#ff99b6', '#b583ff', '#ffde43']
            });
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.8, x: 0.8 },
                colors: ['#ff5c8a', '#ff99b6', '#b583ff', '#ffde43']
            });
        }
    </script>
</body>
</html>
